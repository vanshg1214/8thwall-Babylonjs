<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Babylon.js + 8th Wall AR</title>
  
  <!-- Babylon.js Core and Loaders -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>

  <!-- 8th Wall Scripts -->
  <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script>

  <!-- meta-package for 8th Wall -->
  <meta name="8thwall:package" content="@8thwall.xrextras"/>
  <meta name="8thwall:package" content="@8thwall.landing-page"/>
</head>

<body>
  <!-- 8th Wall camera feed canvas (BOTTOM layer, z-index: 1) -->
  <canvas id="xrCanvas" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;"></canvas>

  <!-- Babylon.js 3D rendering canvas (TOP layer, transparent, z-index: 2) -->
  <canvas id="renderCanvas" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 2; touch-action: none; outline: none;"></canvas>

  <div class="over">
    <span id="promptText">Tap to Place the Grill</span>
    
    <div class="measurements-container" id="measurementsContainer" style="display: none;">
      <div class="measurements-pill" id="measurementText">
        SIZE: 0.00m × 0.00m × 0.00m
      </div>
    </div>

    <!-- Hidden for Grill by default, will show if product needs it -->
    <div class="color-controls" id="colorControls" style="display: none;">
      <button class="color-btn active" style="--btn-color: #333333" data-color="#333333"></button>
      <button class="color-btn" style="--btn-color: #8b4513" data-color="#8b4513"></button>
    </div>
  </div>

  <script src="bundle.js"></script>
</body>

</html>
